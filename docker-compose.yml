version: "3.9"

# ============================================================
# Kite ML Trading Pipeline — Docker Compose
# Optimized for Apple Silicon (M4) / ARM64
#
# Services:
#   questdb  — Time-series database (ILP + Postgres wire)
#   grafana  — Dashboards (reads from QuestDB via Postgres)
#   mlflow   — ML experiment tracking
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop (data persisted in ./data/)
# ============================================================

services:

  questdb:
    image: questdb/questdb:latest        # ARM64 image available natively
    platform: linux/arm64
    container_name: kite_questdb
    restart: unless-stopped
    ports:
      - "9000:9000"    # HTTP API + ILP over HTTP + Web Console
      - "8812:8812"    # PostgreSQL wire protocol
      - "9009:9009"    # ILP over TCP (legacy)
    environment:
      QDB_CAIRO_COMMIT_LAG: "1000"           # 1s commit lag for WAL
      QDB_LINE_TCP_MAINTENANCE_JOB_INTERVAL: "100"
      QDB_SHARED_WORKER_COUNT: "2"           # 2 workers for M4 efficiency
      QDB_PG_PASSWORD: "quest"
      QDB_PG_USER: "admin"
      # Telemetry off for performance
      QDB_TELEMETRY_ENABLED: "false"
    volumes:
      - ./data/questdb:/var/lib/questdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 8g          # Give QuestDB up to 8GB on 24GB machine
    cpus: "3"

  grafana:
    image: grafana/grafana:latest
    platform: linux/arm64
    container_name: kite_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_INSTALL_PLUGINS: "questdb-questdb-datasource"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/etc/grafana/provisioning/dashboards/trading.json"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      questdb:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    platform: linux/arm64
    container_name: kite_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - ./data/mlflow:/mlflow

volumes:
  questdb_data:
  grafana_data:
  mlflow_data:
